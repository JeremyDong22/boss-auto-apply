<!DOCTYPE html>
<html lang="zh-CN">
<head>
<!-- admin.html - v6 - 卡密列表直接显示投递数 -->
<!-- Boss自动投递助手 - 管理员后台（卡密管理 + 投递追踪 + 联系方式管理） -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - Boss自动投递</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f0f2f5;
    color: #333;
    min-height: 100vh;
  }

  /* 顶部导航 */
  .navbar {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .navbar h1 { font-size: 18px; font-weight: 600; }
  .navbar .refresh-btn {
    padding: 6px 14px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  .navbar .refresh-btn:hover { background: rgba(255,255,255,0.25); }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* 统计卡片 */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: #fff;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .stat-card .label { font-size: 12px; color: #999; margin-bottom: 4px; }
  .stat-card .value { font-size: 24px; font-weight: 700; }
  .stat-card .value.total { color: #333; }
  .stat-card .value.active { color: #27ae60; }
  .stat-card .value.inactive { color: #3498db; }
  .stat-card .value.expired { color: #e67e22; }
  .stat-card .value.disabled { color: #e74c3c; }

  /* 生成卡密区 */
  .generate-section {
    background: #fff;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .generate-section h2 {
    font-size: 16px;
    color: #1a1a2e;
    margin-bottom: 14px;
  }
  .generate-form {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .form-group label {
    font-size: 12px;
    color: #666;
    font-weight: 500;
  }
  .form-group input, .form-group select {
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    width: 100px;
    outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: #1a1a2e; }
  .generate-btn {
    padding: 8px 20px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    height: 36px;
  }
  .generate-btn:hover { background: #16213e; }

  /* 生成结果 */
  .generated-result {
    margin-top: 12px;
    padding: 12px 16px;
    background: #f0faf0;
    border: 1px solid #c3e6c3;
    border-radius: 8px;
    font-family: monospace;
    font-size: 14px;
    line-height: 1.8;
    display: none;
  }
  .generated-result .copy-all {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 12px;
    background: #27ae60;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }

  /* 卡密表格 */
  .keys-section {
    background: #fff;
    border-radius: 12px;
    padding: 20px 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .keys-section h2 {
    font-size: 16px;
    color: #1a1a2e;
    margin-bottom: 14px;
  }
  .keys-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .keys-table th {
    text-align: left;
    padding: 10px 8px;
    border-bottom: 2px solid #eee;
    color: #999;
    font-weight: 500;
    font-size: 12px;
    white-space: nowrap;
  }
  .keys-table td {
    padding: 10px 8px;
    border-bottom: 1px solid #f5f5f5;
    vertical-align: top;
  }
  .keys-table tr:hover td { background: #fafafa; }

  /* 卡密代码样式 */
  .key-code {
    font-family: monospace;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.5px;
    cursor: pointer;
  }
  .key-code:active { opacity: 0.6; }

  /* 状态标签 */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge.active { background: #e8f5e9; color: #27ae60; }
  .badge.inactive { background: #e3f2fd; color: #1976d2; }
  .badge.expired { background: #fff3e0; color: #e65100; }
  .badge.disabled { background: #fce4ec; color: #c62828; }

  /* 设备列表 */
  .device-list {
    font-size: 11px;
    color: #888;
    line-height: 1.6;
  }
  .device-item {
    padding: 2px 0;
  }
  .device-fp {
    font-family: monospace;
    font-size: 10px;
    color: #aaa;
  }

  /* 操作按钮 */
  .action-btn {
    padding: 3px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #fff;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
  }
  .action-btn:hover { background: #f5f5f5; }
  .action-btn.danger { color: #e74c3c; border-color: #f5c6cb; }
  .action-btn.danger:hover { background: #fef0f0; }
  .action-btn.success { color: #27ae60; border-color: #c3e6c3; }
  .action-btn.success:hover { background: #f0faf0; }

  /* 空状态 */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #999;
    font-size: 14px;
  }

  /* toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #333;
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 9999;
    transition: transform 0.3s;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 登录遮罩 */
  .login-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26,26,46,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  }
  .login-overlay.hidden { display: none; }
  .login-card {
    background: #fff;
    border-radius: 12px;
    padding: 32px 36px;
    width: 340px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    text-align: center;
  }
  .login-card h2 {
    font-size: 18px;
    color: #1a1a2e;
    margin-bottom: 20px;
  }
  .login-card input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 15px;
    outline: none;
    margin-bottom: 12px;
  }
  .login-card input:focus { border-color: #1a1a2e; }
  .login-btn {
    width: 100%;
    padding: 10px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .login-btn:hover { background: #16213e; }
  .login-error {
    margin-top: 12px;
    color: #e74c3c;
    font-size: 13px;
    min-height: 20px;
  }

  /* 投递统计弹窗 */
  .stats-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  }
  .stats-overlay.hidden { display: none; }
  .stats-modal {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    width: 680px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
  }
  .stats-modal h2 {
    font-size: 18px;
    color: #1a1a2e;
    margin-bottom: 6px;
  }
  .stats-modal .stats-summary {
    font-size: 13px;
    color: #666;
    margin-bottom: 16px;
  }
  .stats-modal .close-btn {
    float: right;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #999;
    line-height: 1;
  }
  .stats-modal .close-btn:hover { color: #333; }
  .stats-modal h3 {
    font-size: 14px;
    color: #1a1a2e;
    margin: 16px 0 8px;
  }
  .daily-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 12px;
  }
  .daily-bar .date { width: 80px; color: #666; text-align: right; }
  .daily-bar .bar {
    height: 18px;
    background: linear-gradient(90deg, #00bebd, #00a8a7);
    border-radius: 3px;
    min-width: 2px;
    transition: width 0.3s;
  }
  .daily-bar .count { color: #333; font-weight: 600; min-width: 30px; }
  .log-item {
    display: flex;
    gap: 12px;
    padding: 6px 0;
    border-bottom: 1px solid #f5f5f5;
    font-size: 12px;
  }
  .log-item .log-time { color: #999; white-space: nowrap; }
  .log-item .log-job { color: #333; flex: 1; }
  .log-item .log-salary { color: #27ae60; font-weight: 600; white-space: nowrap; }

  /* 联系方式管理 */
  .contact-section {
    background: #fff;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .contact-section h2 {
    font-size: 16px;
    color: #1a1a2e;
    margin-bottom: 14px;
  }
  .contact-form {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .contact-left { flex: 1; min-width: 240px; }
  .contact-right { text-align: center; }
  .contact-left .form-group { margin-bottom: 12px; }
  .contact-left .form-group input { width: 220px; }
  .qr-preview {
    width: 140px; height: 140px;
    border: 2px dashed #ddd;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .qr-preview:hover { border-color: #1a1a2e; }
  .qr-preview img { max-width: 100%; max-height: 100%; }
  .qr-preview .placeholder { color: #ccc; font-size: 12px; text-align: center; line-height: 1.5; }
  .contact-save {
    padding: 8px 20px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .contact-save:hover { background: #16213e; }
  .pricing-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .pricing-row input { width: 90px; }
  .pricing-row label { font-size: 12px; color: #666; }
  .pricing-row .popular-check { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #666; }

  /* 可点击数字样式 */
  .clickable-number {
    cursor: pointer;
    color: #00bebd;
    font-weight: 600;
    transition: all 0.2s;
  }
  .clickable-number:hover {
    color: #00a8a7;
    transform: scale(1.05);
  }

  /* 刷新按钮旋转动画 */
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .spinning {
    display: inline-block;
    animation: spin 0.6s linear;
  }

  @media (max-width: 640px) {
    .container { padding: 16px 12px; }
    .generate-form { flex-direction: column; align-items: stretch; }
    .form-group input { width: 100%; }
    .keys-table { font-size: 12px; }
    .contact-form { flex-direction: column; }
    .contact-left .form-group input { width: 100%; }
  }
</style>
</head>
<body>

<!-- 登录遮罩 -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2>管理员登录</h2>
    <form onsubmit="doLogin(event)">
      <input type="password" id="loginPw" placeholder="请输入管理密码" autofocus>
      <button type="submit" class="login-btn">登录</button>
    </form>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="navbar">
  <h1>Boss自动投递 - 管理后台</h1>
  <div>
    <a href="https://boss-frontend.preview.aliyun-zeabur.cn/" target="_blank" class="refresh-btn" style="text-decoration:none;display:inline-block">客户购买页</a>
    <button class="refresh-btn" onclick="logout()" style="margin-left:8px">退出登录</button>
  </div>
</div>

<div class="container">

  <!-- 统计概览 -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="label">总卡密数</div><div class="value total" id="statTotal">-</div></div>
    <div class="stat-card"><div class="label">使用中</div><div class="value active" id="statActive">-</div></div>
    <div class="stat-card"><div class="label">未激活</div><div class="value inactive" id="statInactive">-</div></div>
    <div class="stat-card"><div class="label">已过期</div><div class="value expired" id="statExpired">-</div></div>
    <div class="stat-card"><div class="label">已禁用</div><div class="value disabled" id="statDisabled">-</div></div>
  </div>

  <!-- 联系方式 + 定价管理 -->
  <div class="contact-section">
    <h2 style="margin-bottom:14px">联系方式 & 定价管理</h2>
    <div class="contact-form">
      <div class="contact-left">
        <div class="form-group">
          <label>微信号</label>
          <input type="text" id="contactWechatId" placeholder="输入微信号">
        </div>
      </div>
      <div class="contact-right">
        <div class="qr-preview" id="qrPreview" onclick="document.getElementById('qrFileInput').click()">
          <div class="placeholder" id="qrPlaceholder">点击上传<br>微信二维码</div>
          <img id="qrPreviewImg" style="display:none">
        </div>
        <input type="file" id="qrFileInput" accept="image/*" style="display:none" onchange="handleQrUpload(event)">
        <button class="action-btn" onclick="document.getElementById('qrFileInput').click()" style="font-size:12px">更换二维码</button>
        <button class="action-btn danger" onclick="removeQrcode()" style="font-size:12px;margin-left:4px">删除</button>
      </div>
    </div>
    <!-- 定价方案 -->
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0">
      <div style="font-size:13px;color:#666;font-weight:500;margin-bottom:10px">定价方案</div>
      <div id="pricingRows" style="display:flex;flex-direction:column;gap:8px"></div>
      <button class="contact-save" onclick="saveContact()" style="margin-top:14px">保存</button>
    </div>
  </div>

  <!-- 生成卡密 -->
  <div class="generate-section">
    <h2>生成卡密</h2>
    <div class="generate-form">
      <div class="form-group">
        <label>有效天数</label>
        <input type="number" id="genDays" value="1" min="1" max="365">
      </div>
      <div class="form-group">
        <label>设备上限</label>
        <input type="number" id="genDevices" value="1" min="1" max="10">
      </div>
      <div class="form-group">
        <label>生成数量</label>
        <input type="number" id="genCount" value="1" min="1" max="100">
      </div>
      <div class="form-group">
        <label>实收 (RMB)</label>
        <input type="text" id="genAmount" inputmode="decimal" placeholder="0.00" value="0.00" style="width:100px"
          onfocus="if(this.value==='0.00')this.select()"
          onblur="var v=parseFloat(this.value)||0;this.value=v.toFixed(2)"
          oninput="this.value=this.value.replace(/[^\d.]/g,'')">
      </div>
      <div class="form-group">
        <label>备注</label>
        <input type="text" id="genNote" placeholder="如：张三/微信xxx" style="width:160px">
      </div>
      <button class="generate-btn" onclick="generateKeys()">生成</button>
    </div>
    <div class="generated-result" id="genResult"></div>
  </div>

  <!-- 被锁定的 IP -->
  <div class="keys-section" id="blockedSection" style="margin-bottom:24px;display:none">
    <h2>被锁定的 IP</h2>
    <div id="blockedContainer"></div>
  </div>

  <!-- 卡密列表 -->
  <div class="keys-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h2 style="margin:0">卡密列表</h2>
      <button class="action-btn" onclick="loadData()" style="padding:6px 14px;font-size:12px">
        <span id="refreshIcon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M21.5 2v6h-6"/><path d="M2.5 22v-6h6"/><path d="M2.5 11.5a10 10 0 0 1 17.1-5.9L21.5 8"/><path d="M21.5 12.5a10 10 0 0 1-17.1 5.9L2.5 16"/></svg></span> 刷新
      </button>
    </div>
    <div id="keysTableContainer">
      <div class="empty-state">加载中...</div>
    </div>
  </div>

</div>

<!-- 投递统计弹窗 -->
<div class="stats-overlay hidden" id="statsOverlay" onclick="if(event.target===this)closeStats()">
  <div class="stats-modal">
    <button class="close-btn" onclick="closeStats()">&times;</button>
    <h2 id="statsTitle">投递统计</h2>
    <div class="stats-summary" id="statsSummary"></div>
    <h3>每日投递量</h3>
    <div id="dailyChart"></div>
    <h3>最近投递记录</h3>
    <div id="logsContainer"></div>
  </div>
</div>

<!-- 设备详情弹窗 -->
<div class="stats-overlay hidden" id="devicesOverlay" onclick="if(event.target===this)closeDevices()">
  <div class="stats-modal">
    <button class="close-btn" onclick="closeDevices()">&times;</button>
    <h2 id="devicesTitle">设备详情</h2>
    <div id="devicesContainer"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:3456'
    : 'https://boss-backend.preview.aliyun-zeabur.cn';

// 管理员认证
function getAdminPw() { return sessionStorage.getItem('admin_pw'); }

function showLogin() {
    document.getElementById('loginOverlay').classList.remove('hidden');
    document.getElementById('loginPw').value = '';
    document.getElementById('loginError').textContent = '';
}

function logout() {
    sessionStorage.removeItem('admin_pw');
    showLogin();
}

async function doLogin(e) {
    e.preventDefault();
    var pw = document.getElementById('loginPw').value.trim();
    if (!pw) return;
    try {
        var res = await fetch(API_BASE + '/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pw })
        });
        var data = await res.json();
        if (!data.ok) {
            document.getElementById('loginError').textContent = data.msg;
            return;
        }
        sessionStorage.setItem('admin_pw', pw);
        document.getElementById('loginOverlay').classList.add('hidden');
        loadData();
        loadContact();
    } catch(err) {
        document.getElementById('loginError').textContent = '连接失败';
    }
}

function adminFetch(url, options) {
    options = options || {};
    options.headers = options.headers || {};
    options.headers['Authorization'] = 'Bearer ' + getAdminPw();
    return fetch(url, options).then(function(res) {
        if (res.status === 401) {
            sessionStorage.removeItem('admin_pw');
            showLogin();
            throw new Error('未授权');
        }
        return res;
    });
}

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2000);
}

// 格式化日期
function fmtDate(iso) {
    if (!iso) return '-';
    var d = new Date(iso);
    return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0') + ' ' +
        String(d.getHours()).padStart(2, '0') + ':' +
        String(d.getMinutes()).padStart(2, '0');
}

// 解码指纹为可读格式
function decodeFp(fp) {
    try {
        var decoded = atob(fp);
        var parts = decoded.split('|');
        // 格式: 宽|高|色深|语言|时区偏移|平台
        if (parts.length >= 4) {
            return parts[0] + 'x' + parts[1] + ' ' + parts[3] + ' ' + (parts[5] || '');
        }
        return decoded.slice(0, 30);
    } catch(e) {
        return fp.slice(0, 20) + '...';
    }
}

// 加载数据
async function loadData() {
    // 添加刷新动画
    var icon = document.getElementById('refreshIcon');
    if (icon) {
        icon.classList.add('spinning');
        setTimeout(function() { icon.classList.remove('spinning'); }, 600);
    }

    try {
        var res = await adminFetch(API_BASE + '/api/admin/keys');
        var data = await res.json();
        if (!data.ok) { showToast('加载失败'); return; }

        // 更新统计
        document.getElementById('statTotal').textContent = data.stats.total;
        document.getElementById('statActive').textContent = data.stats.active;
        document.getElementById('statInactive').textContent = data.stats.inactive;
        document.getElementById('statExpired').textContent = data.stats.expired;

function renderTable(keys) {
    var container = document.getElementById('keysTableContainer');

    if (keys.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无卡密，点击上方「生成」创建</div>';
        return;
    }

    // 按创建时间倒序
    keys.sort(function(a, b) { return new Date(b.created_at) - new Date(a.created_at); });

    var html = '<table class="keys-table">' +
        '<thead><tr>' +
        '<th>卡密</th><th>备注</th><th>实收(RMB)</th><th>状态</th><th>投递数</th><th>有效期</th><th>设备</th><th>激活时间</th><th>操作</th>' +
        '</tr></thead><tbody>';

    keys.forEach(function(k) {
        // 状态标签
        var badge = '<span class="badge ' + k.status + '">' + k.status_label + '</span>';

        // 设备数量（点击打开弹窗）
        var devicesHtml = '';
        if (k.devices.length === 0) {
            devicesHtml = '<span style="color:#ccc">0/' + k.max_devices + '</span>';
        } else {
            devicesHtml = '<span class="clickable-number" onclick="viewDevices(\'' + k.code + '\')" title="点击查看设备详情">' +
                k.devices.length + '/' + k.max_devices + '</span>';
        }

        // 操作按钮（移除统计按钮）
        var actionHtml;
        if (k.disabled) {
            actionHtml = '<button class="action-btn success" onclick="enableKey(\'' + k.code + '\')">启用</button> ';
        } else {
            actionHtml = '<button class="action-btn danger" onclick="disableKey(\'' + k.code + '\')">禁用</button> ';
        }
        actionHtml += '<button class="action-btn danger" onclick="deleteKey(\'' + k.code + '\')" style="margin-left:4px">删除</button>';

        html += '<tr>' +
            '<td><span class="key-code" onclick="copyCode(this)">' + k.code + '</span></td>' +
            '<td><span class="note-text" onclick="editNote(\'' + k.code + '\', this)" title="点击编辑" style="cursor:pointer;color:' + (k.note ? '#333' : '#ccc') + ';font-size:12px;max-width:120px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (k.note || '点击添加') + '</span></td>' +
            '<td><span style="color:#27ae60;font-weight:600;font-size:13px">¥' + (k.amount ? k.amount.toFixed(2) : '0.00') + '</span></td>' +
            '<td>' + badge + '</td>' +
            '<td><span class="clickable-number" onclick="viewStats(\'' + k.code + '\')" title="点击查看统计">' + (k.total_applied || 0) + '</span></td>' +
            '<td>' + k.days + '天</td>' +
            '<td>' + devicesHtml + '</td>' +
            '<td>' + fmtDate(k.activated_at) + '</td>' +
            '<td>' + actionHtml + '</td>' +
            '</tr>';
    });

    html += '</tbody></table>';
    container.innerHTML = html;
}

// 生成卡密
async function generateKeys() {
    var days = parseInt(document.getElementById('genDays').value) || 30;
    var maxDevices = parseInt(document.getElementById('genDevices').value) || 2;
    var count = parseInt(document.getElementById('genCount').value) || 1;
    var amount = parseFloat(document.getElementById('genAmount').value) || 0;
    var note = document.getElementById('genNote').value.trim();

    try {
        var res = await adminFetch(API_BASE + '/api/admin/generate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ days: days, max_devices: maxDevices, count: count, amount: amount, note: note })
        });
        var data = await res.json();
        if (!data.ok) { showToast('生成失败'); return; }

        // 显示结果
        var el = document.getElementById('genResult');
        el.style.display = 'block';
        el.innerHTML = data.generated.join('<br>') +
            '<br><button class="copy-all" onclick="copyKeys()">复制全部</button>';
        el.dataset.keys = data.generated.join('\n');

        showToast('已生成 ' + data.generated.length + ' 个卡密');
        loadData(); // 刷新表格
    } catch(e) {
        showToast('请求失败: ' + e.message);
    }
}

function copyKeys() {
    var text = document.getElementById('genResult').dataset.keys;
    navigator.clipboard.writeText(text).then(function() {
        showToast('已复制到剪贴板');
    });
}

// 点击复制卡密
function copyCode(el) {
    navigator.clipboard.writeText(el.textContent).then(function() {
        var orig = el.textContent;
        el.textContent = '已复制';
        el.style.color = '#27ae60';
        setTimeout(function() { el.textContent = orig; el.style.color = ''; }, 800);
    });
}

// 投递统计
async function viewStats(code) {
    document.getElementById('statsOverlay').classList.remove('hidden');
    document.getElementById('statsTitle').textContent = '投递统计 - ' + code;
    document.getElementById('statsSummary').innerHTML = '<div style="color:#999;font-size:13px">加载中...</div>';
    document.getElementById('dailyChart').innerHTML = '';
    document.getElementById('logsContainer').innerHTML = '';

    try {
        var res = await adminFetch(API_BASE + '/api/admin/stats?key=' + encodeURIComponent(code));
        var data = await res.json();
        if (!data.ok) {
            document.getElementById('statsSummary').innerHTML = '<div style="color:#e74c3c;font-size:13px">加载失败</div>';
            return;
        }

        // 统计概览卡片
        var summaryHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px">' +
            '<div style="background:#f0faf0;padding:16px;border-radius:8px;text-align:center">' +
            '<div style="font-size:28px;font-weight:700;color:#27ae60">' + data.total_applied + '</div>' +
            '<div style="font-size:12px;color:#666;margin-top:4px">累计投递</div>' +
            '</div>';

        // 计算平均每日投递
        var daily = data.daily || [];
        var avgDaily = daily.length > 0 ? Math.round(data.total_applied / daily.length) : 0;
        summaryHtml += '<div style="background:#e3f2fd;padding:16px;border-radius:8px;text-align:center">' +
            '<div style="font-size:28px;font-weight:700;color:#1976d2">' + avgDaily + '</div>' +
            '<div style="font-size:12px;color:#666;margin-top:4px">日均投递</div>' +
            '</div>';

        // 最近一天投递
        var lastDay = daily.length > 0 ? daily[daily.length - 1].applied : 0;
        summaryHtml += '<div style="background:#fff3e0;padding:16px;border-radius:8px;text-align:center">' +
            '<div style="font-size:28px;font-weight:700;color:#e65100">' + lastDay + '</div>' +
            '<div style="font-size:12px;color:#666;margin-top:4px">最近一天</div>' +
            '</div></div>';

        document.getElementById('statsSummary').innerHTML = summaryHtml;

        // 每日柱状图 - 改进版
        if (daily.length === 0) {
            document.getElementById('dailyChart').innerHTML = '<div style="color:#999;font-size:13px;text-align:center;padding:20px">暂无数据</div>';
        } else {
            var maxApplied = Math.max.apply(null, daily.map(function(d) { return d.applied; }));
            if (maxApplied === 0) maxApplied = 1;
            var chartHtml = '<div style="display:flex;flex-direction:column;gap:8px">';
            daily.forEach(function(d) {
                var percentage = Math.round((d.applied / maxApplied) * 100);
                var barWidth = Math.max(percentage, 2); // 最小2%可见
                chartHtml += '<div style="display:flex;align-items:center;gap:12px">' +
                    '<span style="font-size:12px;color:#666;min-width:60px;text-align:right">' + d.date.slice(0,10).slice(5) + '</span>' +
                    '<div style="flex:1;background:#f0f0f0;border-radius:4px;height:24px;position:relative;overflow:hidden">' +
                    '<div style="width:' + barWidth + '%;height:100%;background:linear-gradient(90deg,#00bebd,#00a8a7);border-radius:4px;transition:width 0.3s"></div>' +
                    '</div>' +
                    '<span style="font-size:13px;font-weight:600;color:#333;min-width:40px">' + d.applied + '</span>' +
                    '</div>';
            });
            chartHtml += '</div>';
            document.getElementById('dailyChart').innerHTML = chartHtml;
        }

        // 最近投递记录 - 懒加载，每次20条
        window._statsLogsKey = code;
        window._statsLogsOffset = 0;
        renderLogs(data.logs || [], true);
    } catch(e) {
        document.getElementById('statsSummary').innerHTML = '<div style="color:#e74c3c;font-size:13px">请求失败: ' + e.message + '</div>';
    }
}

// 渲染投递记录表格（append=false 时重建，true 时追加行）
function renderLogs(logs, isFirst) {
    var container = document.getElementById('logsContainer');
    if (isFirst && logs.length === 0) {
        container.innerHTML = '<div style="color:#999;font-size:13px;text-align:center;padding:20px">暂无记录</div>';
        return;
    }

    // 记录当前已有行数（用于奇偶色计算）
    var existingRows = 0;
    if (isFirst) {
        container.innerHTML = '<div style="background:#f9f9f9;border-radius:8px;overflow:hidden">' +
            '<table id="logsTable" style="width:100%;border-collapse:collapse">' +
            '<thead><tr style="background:#f0f0f0">' +
            '<th style="padding:10px 12px;text-align:left;font-size:12px;color:#666;font-weight:500">时间</th>' +
            '<th style="padding:10px 12px;text-align:left;font-size:12px;color:#666;font-weight:500">职位</th>' +
            '<th style="padding:10px 12px;text-align:right;font-size:12px;color:#666;font-weight:500">薪资</th>' +
            '</tr></thead><tbody id="logsTbody"></tbody></table></div>' +
            '<div id="logsLoadMore" style="text-align:center;padding:16px"></div>';
    } else {
        var tbody = document.getElementById('logsTbody');
        existingRows = tbody ? tbody.children.length : 0;
    }

    var tbody = document.getElementById('logsTbody');
    logs.forEach(function(l, i) {
        var rowIdx = existingRows + i;
        var isLimit = (l.job_name || '').indexOf('[限流]') === 0;
        var bgColor = rowIdx % 2 === 0 ? '#fff' : '#fafafa';
        if (isLimit) bgColor = '#fff3e0';

        var tr = document.createElement('tr');
        tr.style.background = bgColor;
        tr.innerHTML =
            '<td style="padding:10px 12px;font-size:12px;color:#666;white-space:nowrap">' + (l.applied_at || '-').replace('T', ' ').slice(5, 16) + '</td>' +
            '<td style="padding:10px 12px;font-size:13px;color:' + (isLimit ? '#e65100' : '#333') + ';font-weight:' + (isLimit ? '600' : '400') + '">' + (l.job_name || '-') + '</td>' +
            '<td style="padding:10px 12px;font-size:13px;color:#27ae60;font-weight:600;text-align:right;white-space:nowrap">' + (l.salary || '-') + '</td>';
        tbody.appendChild(tr);
    });

    window._statsLogsOffset += logs.length;

    // 加载更多按钮：如果返回了满 20 条说明可能还有更多
    var loadMoreDiv = document.getElementById('logsLoadMore');
    if (logs.length >= 20) {
        loadMoreDiv.innerHTML = '<button onclick="loadMoreLogs()" style="padding:8px 24px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#666;cursor:pointer;font-size:13px">加载更多</button>';
    } else {
        loadMoreDiv.innerHTML = logs.length > 0 ? '<div style="color:#ccc;font-size:12px">没有更多了</div>' : '';
    }
}

// 加载更多投递记录
async function loadMoreLogs() {
    var loadMoreDiv = document.getElementById('logsLoadMore');
    loadMoreDiv.innerHTML = '<div style="color:#999;font-size:12px">加载中...</div>';

    try {
        var res = await adminFetch(API_BASE + '/api/admin/stats?key=' + encodeURIComponent(window._statsLogsKey) +
            '&offset=' + window._statsLogsOffset + '&limit=20');

            loadMoreDiv.innerHTML = '<div style="color:#e74c3c;font-size:12px">加载失败</div>';

        }
        renderLogs(data.logs || [], false);
    } catch(e) {
        loadMoreDiv.innerHTML = '<div style="color:#e74c3c;font-size:12px">请求失败: ' + e.message + '</div>';
    }
}

// 编辑卡密备注（点击即编辑）
function editNote(code, el) {
    var old = el.textContent === '点击添加' ? '' : el.textContent;
    var input = document.createElement('input');
    input.type = 'text';
    input.value = old;
    input.placeholder = '输入备注';
    input.style.cssText = 'width:120px;padding:2px 6px;border:1px solid #00bebd;border-radius:4px;font-size:12px;outline:none';
    el.replaceWith(input);
    input.focus();
    function save() {
        var val = input.value.trim();
        adminFetch(API_BASE + '/api/admin/note', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: code, note: val })
        }).then(function() { loadData(); });
    }
    input.onblur = save;
    input.onkeydown = function(e) { if (e.key === 'Enter') { input.blur(); } };
}

var pendingQrBase64 = ''; // 暂存上传的二维码 base64
var defaultPricing = [
    { name: '体验卡', price: 1, unit: '元', duration: '1天', popular: false },
    { name: '周卡', price: 5, unit: '元', duration: '7天', popular: true },
    { name: '月卡', price: 15, unit: '元', duration: '30天', popular: false }
];

function renderPricingRows(pricing) {
    var container = document.getElementById('pricingRows');
    var html = '';
    pricing.forEach(function(p, i) {
        html += '<div class="pricing-row">' +
            '<div class="form-group"><label>方案名</label><input type="text" id="pName' + i + '" value="' + (p.name || '') + '" placeholder="如：周卡"></div>' +
            '<div class="form-group"><label>价格</label><input type="number" id="pPrice' + i + '" value="' + (p.price || 0) + '" min="0" step="0.01"></div>' +
            '<div class="form-group"><label>单位</label><input type="text" id="pUnit' + i + '" value="' + (p.unit || '元') + '" style="width:50px"></div>' +
            '<div class="form-group"><label>时长</label><input type="text" id="pDuration' + i + '" value="' + (p.duration || '') + '" placeholder="如：7天"></div>' +
            '<div class="popular-check"><input type="radio" name="popularPlan" id="pPopular' + i + '"' + (p.popular ? ' checked' : '') + '><label for="pPopular' + i + '">推荐</label></div>' +
            '</div>';
    });
    container.innerHTML = html;
}

function collectPricing() {
    var pricing = [];
    for (var i = 0; i < 3; i++) {
        var nameEl = document.getElementById('pName' + i);
        if (!nameEl) break;
        pricing.push({
            name: nameEl.value.trim(),
            price: parseFloat(document.getElementById('pPrice' + i).value) || 0,
            unit: document.getElementById('pUnit' + i).value.trim() || '元',
            duration: document.getElementById('pDuration' + i).value.trim(),
            popular: document.getElementById('pPopular' + i).checked
        });
    }
    return pricing;
}

function handleQrUpload(e) {
    var file = e.target.files[0];
    if (!file) return;
    if (file.size > 500 * 1024) { showToast('图片不能超过 500KB'); return; }
    var reader = new FileReader();
    reader.onload = function(ev) {
        pendingQrBase64 = ev.target.result;
        document.getElementById('qrPreviewImg').src = pendingQrBase64;
        document.getElementById('qrPreviewImg').style.display = 'block';
        document.getElementById('qrPlaceholder').style.display = 'none';
    };
    reader.readAsDataURL(file);
}

}

// 初始加载：已登录则加载数据，否则显示登录
var autoRefreshTimer = null;

function startAutoRefresh() {
    // 清除旧的定时器
    if (autoRefreshTimer) clearInterval(autoRefreshTimer);
    // 每30秒自动刷新
    autoRefreshTimer = setInterval(function() {
        loadData();
    }, 30000);
}

function stopAutoRefresh() {
    if (autoRefreshTimer) {
        clearInterval(autoRefreshTimer);
        autoRefreshTimer = null;
    }
}

if (getAdminPw()) {
    document.getElementById('loginOverlay').classList.add('hidden');
    loadData();
    loadContact();
    startAutoRefresh(); // 启动自动刷新
}
</script>
