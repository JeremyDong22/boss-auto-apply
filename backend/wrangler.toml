# wrangler.toml - v1
# Boss 自动投递 - 后端 Worker 配置

name = "boss-auto-apply-api"
main = "_worker.js"
compatibility_date = "2025-01-01"
workers_dev = true

# 自定义域名（绕过国内 .workers.dev 被墙）
[[routes]]
pattern = "boss.smartice.ai"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "boss-license-db"
database_id = "741596d0-1cdd-4969-b336-c64a605472eb"
